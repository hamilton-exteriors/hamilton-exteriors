name: BackOffice Healthcheck

# Triggers /api/healthcheck-backoffice every 5 minutes. The endpoint itself
# checks BackOffice and emails admin@ via Resend on failure — that's the sole
# alert path. This workflow always exits 0 so GitHub never adds its own email.
#
# Public repo → Actions minutes are unlimited. Cron can drift 10-30 min under
# load; fine for this cadence.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping healthcheck
        run: |
          echo "Pinging https://hamilton-exteriors.com/api/healthcheck-backoffice ..."
          curl -sS -o /tmp/body.json -w "HTTP:%{http_code}\n" \
            --max-time 15 \
            https://hamilton-exteriors.com/api/healthcheck-backoffice \
            || echo "curl failed (DNS/network); endpoint won't have self-alerted"
          echo "Body:"
          cat /tmp/body.json 2>/dev/null || echo "(no body)"
          echo
          # Always exit 0 — the endpoint owns alerting. If it returned 503,
          # it already fired the Resend email. GitHub stays quiet on purpose.
          exit 0

name: BackOffice Healthcheck

# Pings /api/healthcheck-backoffice every 5 minutes. The endpoint itself returns
# 503 and self-emails admin@ when BackOffice/Supabase is unreachable, so this
# workflow's job is just to keep it warm and flag the failure in GitHub too —
# GitHub emails repo admins on workflow failure out of the box.
#
# Runs on a public repo so Actions minutes are unlimited. Cron can drift 10-30
# min under GitHub load; that's fine for this alert cadence.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check BackOffice via Hamilton healthcheck
        run: |
          echo "Pinging https://hamilton-exteriors.com/api/healthcheck-backoffice ..."
          RESPONSE=$(curl -sS -o /tmp/body.json -w "%{http_code}" \
            --max-time 15 \
            https://hamilton-exteriors.com/api/healthcheck-backoffice)
          echo "HTTP $RESPONSE"
          echo "Body:"
          cat /tmp/body.json
          echo
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::BackOffice healthcheck failed with HTTP $RESPONSE"
            exit 1
          fi

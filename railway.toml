[build]
builder = "NIXPACKS"
installCommand = "bun install --frozen-lockfile"
buildCommand = "bun run build"

[deploy]
startCommand = "node server.mjs"

[service]
watchPatterns = ["src/**", "public/**", "astro.config.mjs", "package.json", "bun.lock", "server.mjs", "tsconfig.json", "tailwind.config.*"]
